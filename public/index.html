<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autonomous Operations Center (AOC)</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Client v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">

  <!-- Header -->
  <div class="max-w-7xl mx-auto flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-white">Autonomous Operations Center</h1>
      <p class="text-xs text-slate-400 mt-0.5">Real-time Self-Healing Observability Console</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="connection-status" class="text-xs px-2.5 py-1 rounded-full font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20">
        ● Connecting...
      </span>
      <button onclick="loadDashboardData()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 font-medium rounded border border-slate-700 transition">
        Manual Refresh
      </button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto space-y-6">
    <!-- Active Agents Grid -->
    <div>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Agent Health Status</h2>
      <div id="agents-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Dynamic Agent Cards Rendered Here -->
        <div class="p-4 rounded-lg border border-slate-800 bg-slate-900 animate-pulse h-28"></div>
      </div>
    </div>

    <!-- Live Telemetry Stream -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
      <div class="px-5 py-4 border-b border-slate-800 flex justify-between items-center">
        <h2 class="text-sm font-semibold text-slate-200">Live Execution & Healing Timeline</h2>
        <span class="text-xs text-slate-500 font-mono">Direct Supabase Stream</span>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-xs text-left text-slate-300">
          <thead class="bg-slate-950 text-slate-500 uppercase tracking-wider border-b border-slate-800 font-mono">
            <tr>
              <th class="p-3">Time</th>
              <th class="p-3">Agent ID</th>
              <th class="p-3">Status</th>
              <th class="p-3">Model</th>
              <th class="p-3">Healing Action</th>
              <th class="p-3">Retry #</th>
            </tr>
          </thead>
          <tbody id="telemetry-table-body" class="divide-y divide-slate-800/60 font-mono">
            <tr>
              <td colspan="6" class="p-4 text-center text-slate-500">Loading telemetry stream...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // -------------------------------------------------------------
    // CONFIGURATION
    // -------------------------------------------------------------
    // Insert your actual Supabase URL and Anon Key here
    const SUPABASE_URL = "https://ncndzycavosmxdajxuzp.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_vnJMKn-XawScyg-yU1FkyQ_2uXhv-10";

    // Initialize Direct Supabase Client
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // -------------------------------------------------------------
    // DATA FETCHING & RENDERING (NO FETCH API CALLS)
    // -------------------------------------------------------------
    async function loadDashboardData() {
      await Promise.all([fetchAgentHealth(), fetchTelemetryLogs()]);
    }

    async function fetchAgentHealth() {
      const { data: summary, error } = await supabaseClient
        .from('agent_health_summary')
        .select('*');

      if (error) {
        console.error("Error fetching agent summary:", error);
        return;
      }

      renderAgentCards(summary || []);
    }

    async function fetchTelemetryLogs() {
      const { data: logs, error } = await supabaseClient
        .from('telemetry')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error) {
        console.error("Error fetching telemetry logs:", error);
        return;
      }

      renderTelemetryTable(logs || []);
    }

    // Render Agent Cards
    function renderAgentCards(agents) {
      const container = document.getElementById('agents-grid');
      if (!agents || agents.length === 0) {
        container.innerHTML = `<div class="col-span-3 p-4 bg-slate-900 border border-slate-800 rounded-lg text-xs text-slate-500">No agent activity recorded yet. Run test_autonomous_loop.py on Windows.</div>`;
        return;
      }

      container.innerHTML = agents.map(agent => {
        const isCircuitOpen = agent.last_healing_action === 'CIRCUIT_BREAKER_TRIPPED';
        return `
          <div class="p-4 rounded-xl border ${isCircuitOpen ? 'border-rose-500/50 bg-rose-950/20' : 'border-slate-800 bg-slate-900'} transition-all">
            <div class="flex justify-between items-center mb-2">
              <span class="font-semibold text-slate-200">${agent.agent_id}</span>
              <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${isCircuitOpen ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}">
                ${isCircuitOpen ? '🔴 Circuit Open' : '🟢 Healthy'}
              </span>
            </div>
            <div class="space-y-1 text-xs text-slate-400">
              <div class="flex justify-between"><span>Executions:</span> <span class="text-slate-200 font-mono">${agent.total_executions || 0}</span></div>
              <div class="flex justify-between"><span>Last Action:</span> <span class="text-amber-400 font-mono">${agent.last_healing_action || 'NONE'}</span></div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Render Telemetry Table Rows
    function renderTelemetryTable(logs) {
      const tbody = document.getElementById('telemetry-table-body');
      if (!logs || logs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-500">No telemetry events logged yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = logs.map(log => {
        const isFailed = log.status === 'FAILED';
        const timeStr = new Date(log.created_at).toLocaleTimeString();
        return `
          <tr class="hover:bg-slate-800/40 transition-colors">
            <td class="p-3 text-slate-500">${timeStr}</td>
            <td class="p-3 font-semibold text-slate-200">${log.agent_id}</td>
            <td class="p-3">
              <span class="px-2 py-0.5 rounded text-[10px] font-bold ${isFailed ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}">
                ${log.status}
              </span>
            </td>
            <td class="p-3 text-slate-400">${log.model || 'N/A'}</td>
            <td class="p-3 text-amber-400 font-medium">${log.healing_action || 'NONE'}</td>
            <td class="p-3 text-slate-400">${log.retry_count !== undefined ? log.retry_count : 0}</td>
          </tr>
        `;
      }).join('');
    }

    // -------------------------------------------------------------
    // WEBSOCKET REALTIME SUBSCRIPTION
    // -------------------------------------------------------------
    function setupRealtimeSubscription() {
      const statusBadge = document.getElementById('connection-status');

      const channel = supabaseClient
        .channel('realtime_telemetry')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'telemetry' },
          (payload) => {
            console.log("⚡ Realtime Telemetry Received:", payload.new);
            loadDashboardData(); // Instantly update UI on new event
          }
        )
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            statusBadge.className = "text-xs px-2.5 py-1 rounded-full font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            statusBadge.innerText = "● Live Realtime Stream";
          }
        });
    }

    // Initialize Dashboard on Load
    document.addEventListener('DOMContentLoaded', () => {
      loadDashboardData();
      setupRealtimeSubscription();
    });
  </script>
</body>
</html>
