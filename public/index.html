<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Operations Center (AOC)</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 24px; }
    h1 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #1e293b; padding: 16px; border-radius: 8px; border: 1px solid #334155; }
    .card p { color: #94a3b8; margin: 0 0 8px 0; font-size: 14px; }
    .card h2 { margin: 0; font-size: 28px; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #0f172a; color: #94a3b8; font-size: 14px; }
    .status-SUCCESS { color: #4ade80; font-weight: bold; }
    .status-FAILED, .status-ERROR { color: #f87171; font-weight: bold; }
  </style>
</head>
<body>

  <h1>AI Operations Center (AOC)</h1>

  <!-- Metrics Overview -->
  <div class="grid">
    <div class="card">
      <p>Total Events</p>
      <h2 id="total-events">0</h2>
    </div>
    <div class="card">
      <p>Successful Runs</p>
      <h2 id="success-events" style="color: #4ade80;">0</h2>
    </div>
    <div class="card">
      <p>Active Failures</p>
      <h2 id="failed-events" style="color: #f87171;">0</h2>
    </div>
    <div class="card">
      <p>Avg Latency</p>
      <h2 id="avg-latency" style="color: #38bdf8;">0 ms</h2>
    </div>
  </div>

  <h2>Live Telemetry Feed</h2>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Agent ID</th>
        <th>Action</th>
        <th>Status</th>
        <th>Latency</th>
      </tr>
    </thead>
    <tbody id="telemetry-table-body">
      <tr>
        <td colspan="5" style="text-align: center; color: #94a3b8;">Loading live logs...</td>
      </tr>
    </tbody>
  </table>

  <script>
    async function fetchTelemetryHistory() {
      try {
        const response = await fetch('/api/v1/telemetry/history');
        const data = await response.json();

        if (data.success && Array.isArray(data.logs)) {
          const logs = data.logs;

          // Calculate Metrics
          const total = logs.length;
          const failures = logs.filter(l => l.status === 'FAILED' || l.status === 'ERROR').length;
          const successes = total - failures;

          let totalLatency = 0;
          logs.forEach(l => {
            const num = parseInt(l.latency) || 0;
            totalLatency += num;
          });
          const avgLatency = total > 0 ? Math.round(totalLatency / total) : 0;

          // Update Metric Cards
          document.getElementById('total-events').innerText = total;
          document.getElementById('success-events').innerText = successes;
          document.getElementById('failed-events').innerText = failures;
          document.getElementById('avg-latency').innerText = avgLatency + ' ms';

          // Update Table Rows
          const tbody = document.getElementById('telemetry-table-body');
          if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #94a3b8;">No telemetry records found.</td></tr>';
            return;
          }

          tbody.innerHTML = logs.map(log => `
            <tr>
              <td style="color: #94a3b8;">${new Date(log.created_at).toLocaleTimeString()}</td>
              <td style="font-weight: 600;">${log.agent_id}</td>
              <td>${log.action}</td>
              <td><span class="status-${log.status}">${log.status}</span></td>
              <td>${log.latency}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('Error fetching telemetry:', err);
      }
    }

    // Initial Fetch + Poll every 5 seconds
    fetchTelemetryHistory();
    setInterval(fetchTelemetryHistory, 5000);
  </script>
</body>
</html>
