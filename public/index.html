<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOC - AI Operations Center</title>
  <style>
    :root {
      --dt-bg: #0d1117;
      --dt-card-bg: #161b22;
      --dt-accent: #58a6ff;
      --dt-text: #c9d1d9;
      --dt-border: #30363d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #090d16;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #30363d;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      background: rgba(46, 160, 67, 0.15);
      color: #3fb950;
      border: 1px solid rgba(46, 160, 67, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Grid Layout for Dashboard Modules */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Phase 3 Specific Styles */
    .phase3-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      margin-top: 10px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>
      ⚡ AOC // AI Operations Center 
      <span class="status-badge">Live System</span>
    </h1>
    <div id="system-clock" style="font-size: 12px; color: #8b949e; font-mono: true;"></div>
  </header>

  <!-- Phases 1 & 2 Workspace Placeholder -->
  <main class="dashboard-grid">
    <div class="card">
      <div class="card-title">Phase 1: Agent Telemetry</div>
      <div id="telemetry-feed" style="font-size: 13px; color: #7d8590;">
        🟢 GROQ_API_KEY Linked <br>
        ⚡ Active Swarms: 4 Nodes
      </div>
    </div>
    
    <div class="card">
      <div class="card-title">Phase 2: Time Travel & Multi-Mission</div>
      <div id="replay-status" style="font-size: 13px; color: #7d8590;">
        ⏱️ Replay Engine Ready <br>
        📊 Analytics Pipeline: Online
      </div>
    </div>
  </main>

  <!-- Phase 3: Digital Twin Canvas & Enterprise Theme Engine -->
  <section class="phase3-container">
    <div class="section-header">
      <h2>Phase 3: Enterprise Digital Twin Canvas</h2>
      <span style="font-size: 11px; color: #8b949e;">v3.0 Production</span>
    </div>

    <!-- Digital Twin Mounting Target -->
    <div id="digital-twin-container"></div>
  </section>

  <!-- Load Phase 3 Engine -->
  <script src="/phase3.js"></script>

  <script>
    // System Clock
    function updateClock() {
      const clockEl = document.getElementById('system-clock');
      if (clockEl) {
        clockEl.textContent = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Initialize Phase 3 Digital Twin Canvas Engine
    document.addEventListener('DOMContentLoaded', () => {
      if (window.DigitalTwinCanvas) {
        DigitalTwinCanvas.init('digital-twin-container');
      } else {
        console.error('Phase 3 script not found or failed to load.');
      }
    });
  </script>
</body>
</html>
