<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous AI Operations Center (AOC)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.08); }
  </style>
</head>
<body class="p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-slate-800 pb-4">
      <div class="flex items-center space-x-3">
        <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></div>
        <h1 class="text-xl font-bold tracking-wide">AI OPERATIONS CENTER (AOC)</h1>
      </div>
      <div class="text-xs text-slate-400 font-mono" id="last-updated">Last Updated: Syncing...</div>
    </div>

    <!-- 4 Metric Blocks -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="glass-card p-5 rounded-xl">
        <div class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Total Events</div>
        <div class="text-3xl font-extrabold text-white" id="stat-total">0</div>
      </div>
      <div class="glass-card p-5 rounded-xl">
        <div class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Successful Runs</div>
        <div class="text-3xl font-extrabold text-emerald-400" id="stat-success">0</div>
      </div>
      <div class="glass-card p-5 rounded-xl">
        <div class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Active Failures</div>
        <div class="text-3xl font-extrabold text-rose-500" id="stat-failed">0</div>
      </div>
      <div class="glass-card p-5 rounded-xl">
        <div class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Avg Latency</div>
        <div class="text-3xl font-extrabold text-cyan-400" id="stat-latency">0ms</div>
      </div>
    </div>

    <!-- Live Telemetry Feed Section -->
    <div class="glass-card rounded-xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold tracking-wide uppercase text-slate-300">Live Telemetry Feed</h2>
        <span class="text-xs text-slate-500 font-mono">Auto-refreshing (5s)</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-slate-300">
          <thead class="text-xs uppercase bg-slate-800/60 text-slate-400 border-b border-slate-700">
            <tr>
              <th class="p-3">Timestamp</th>
              <th class="p-3">Agent ID</th>
              <th class="p-3">Action</th>
              <th class="p-3">Status</th>
              <th class="p-3">Latency</th>
              <th class="p-3">Reasoning / Output</th>
            </tr>
          </thead>
          <tbody id="telemetry-table-body" class="divide-y divide-slate-800 font-mono text-xs">
            <tr>
              <td colspan="6" class="p-6 text-center text-slate-500 italic font-sans">
                Waiting for incoming agent telemetry traces...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    async function fetchTelemetry() {
      try {
        // Cache-busting parameter t=Date.now() + no-store header to avoid 304 Not Modified
        const res = await fetch(`/api/v1/telemetry/history?t=${Date.now()}`, { 
          cache: 'no-store' 
        });
        const data = await res.json();
        
        if (data.success) {
          updateDashboard(data.logs || []);
        }
      } catch (err) {
        console.error("Failed to fetch telemetry history:", err);
      }
    }

    function updateDashboard(logs) {
      document.getElementById('last-updated').innerText = `Last Updated: ${new Date().toLocaleTimeString()}`;

      if (!logs || logs.length === 0) return;

      // 1. Calculate Metrics
      const total = logs.length;
      const successCount = logs.filter(l => l.status === 'SUCCESS').length;
      const failureCount = logs.filter(l => l.status === 'FAILED' || l.status === 'ERROR').length;

      let totalLatencyMs = 0;
      let validLatencyCount = 0;

      logs.forEach(l => {
        if (l.latency) {
          const num = parseInt(l.latency.replace(/[^0-9]/g, ''));
          if (!isNaN(num)) {
            totalLatencyMs += num;
            validLatencyCount++;
          }
        }
      });

      const avgLatency = validLatencyCount > 0 ? Math.round(totalLatencyMs / validLatencyCount) : 0;

      // 2. Update UI Blocks
      document.getElementById('stat-total').innerText = total;
      document.getElementById('stat-success').innerText = successCount;
      document.getElementById('stat-failed').innerText = failureCount;
      document.getElementById('stat-latency').innerText = `${avgLatency}ms`;

      // 3. Render Table Rows
      const tbody = document.getElementById('telemetry-table-body');
      tbody.innerHTML = logs.map(log => {
        const isSuccess = log.status === 'SUCCESS';
        const badgeStyle = isSuccess 
          ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
          : 'bg-rose-500/10 text-rose-400 border-rose-500/20';
        
        const timestamp = log.created_at ? new Date(log.created_at).toLocaleTimeString() : 'N/A';

        return `
          <tr class="hover:bg-slate-800/40 transition-colors">
            <td class="p-3 text-slate-400">${timestamp}</td>
            <td class="p-3 font-semibold text-white">${log.agent_id || 'N/A'}</td>
            <td class="p-3 text-slate-300 font-sans">${log.action || 'N/A'}</td>
            <td class="p-3">
              <span class="px-2 py-0.5 text-[10px] font-bold rounded border ${badgeStyle}">
                ${log.status}
              </span>
            </td>
            <td class="p-3 text-slate-400">${log.latency || '0ms'}</td>
            <td class="p-3 text-slate-400 font-sans max-w-xs truncate">${log.reasoning || '-'}</td>
          </tr>
        `;
      }).join('');
    }

    // Initial Fetch & Start 5-second Poll
    fetchTelemetry();
    setInterval(fetchTelemetry, 5000);
  </script>
</body>
</html>
