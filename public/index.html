<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SRAZZU AIOps Telemetry Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-yellow: #eab308;
      --accent-blue: #3b82f6;
    }

    body {
      margin: 0;
      padding: 2rem;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.025em;
    }

    .badge {
      background-color: rgba(34, 197, 94, 0.1);
      color: var(--accent-green);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .card h3 {
      margin: 0 0 0.5rem 0;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card .value {
      font-size: 1.75rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    th {
      background-color: rgba(0, 0, 0, 0.2);
      color: var(--text-muted);
      font-weight: 600;
    }

    .status-SUCCESS { color: var(--accent-green); font-weight: 600; }
    .status-FAILED { color: var(--accent-red); font-weight: 600; }
    
    .btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header>
    <h1>SRAZZU Telemetry & Replay Engine</h1>
    <div>
      <span class="badge" id="live-indicator">● LIVE</span>
      <button class="btn" style="margin-left: 1rem;" onclick="fetchLogs()">Refresh</button>
    </div>
  </header>

  <section class="grid">
    <div class="card">
      <h3>Total Ingested Traces</h3>
      <div class="value" id="total-traces">-</div>
    </div>
    <div class="card">
      <h3>System Health Rate</h3>
      <div class="value" id="health-rate" style="color: var(--accent-green);">-</div>
    </div>
    <div class="card">
      <h3>Avg Latency</h3>
      <div class="value" id="avg-latency">-</div>
    </div>
  </section>

  <h2>Recent Agent Executions</h2>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Trace ID</th>
        <th>Agent</th>
        <th>Action</th>
        <th>Model</th>
        <th>Latency</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="logs-body">
      <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Loading execution traces...</td></tr>
    </tbody>
  </table>

  <script>
    async function fetchLogs() {
      try {
        const res = await fetch('/api');
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        const logs = data.logs || [];
        renderMetrics(logs);
        renderTable(logs);

      } catch (err) {
        console.error('Error fetching logs:', err);
        document.getElementById('logs-body').innerHTML = 
          `<tr><td colspan="7" style="color: var(--accent-red); text-align: center;">Error loading logs: ${err.message}</td></tr>`;
      }
    }

    function renderMetrics(logs) {
      document.getElementById('total-traces').innerText = logs.length;
      
      if (logs.length === 0) return;

      const successful = logs.filter(l => l.status === 'SUCCESS').length;
      const healthPct = Math.round((successful / logs.length) * 100);
      const healthElem = document.getElementById('health-rate');
      healthElem.innerText = `${healthPct}%`;
      healthElem.style.color = healthPct > 80 ? 'var(--accent-green)' : 'var(--accent-red)';

      const totalLatency = logs.reduce((acc, l) => acc + (parseFloat(l.latency) || 0), 0);
      const avgLat = (totalLatency / logs.length).toFixed(2);
      document.getElementById('avg-latency').innerText = `${avgLat}s`;
    }

    function renderTable(logs) {
      const tbody = document.getElementById('logs-body');
      if (logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No logs ingested yet.</td></tr>';
        return;
      }

      tbody.innerHTML = logs.map(log => `
        <tr>
          <td>${new Date(log.created_at).toLocaleTimeString()}</td>
          <td><code>${log.trace_id}</code></td>
          <td><strong>${log.agent_id}</strong></td>
          <td>${log.action}</td>
          <td><small>${log.model || 'gpt-4o'}</small></td>
          <td>${log.latency ? log.latency + 's' : '-'}</td>
          <td class="status-${log.status}">${log.status}</td>
        </tr>
      `).join('');
    }

    // Initial load + auto-refresh every 10s
    fetchLogs();
    setInterval(fetchLogs, 10000);
  </script>
</body>
</html>
